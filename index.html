<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Alister Browne's Portfolio</title>
</head>
<!-- This is the main body of the website- ALL your content goes AFTER the <body> tag and before the </body> tag -->
<body>

    <!-- The Hero Section!-------------------------------------------------------------------------------------- -->
    <section class="hero">
        <div class="hero-text"></div>
    </section>

    <!-- The About Me Section ------------------------------------------------------------------------------------- -->    
    <section class="topic">
        <div class="topic-title">
            <h1>About Me!</h1>
        </div>
        <div style="margin: 15px;">
            <div class="topic-card">
                <div class="topic-text">
                    <p>My name is Alister Browne and I like anything related to creative arts!</p>
                </div>
            </div>
        </div>
    </section>

<!-- End of About Me Section ----------------------------------------------------------------------------------- -->

<!-- Topic one ------------------------------------------------------------------------------------------------- -->
    <!-- The First Topic Section -->
    <section class="topic">
        <!-- the topic title a big bar with text in it -->
        <div class="topic-title">
            <h1>My Image Creations!</h1>
        </div>
        <!-- now a three column grid of images -->
        <div class="topic-content">
            <!-- one "card" which includes an image with a text below it -->
            <div class="topic-card">
                <img src="images/JumpingAnimalWinter.png" alt="Pixalated Jumping Animal">
                <h2 class="topic-card-text">Pixel Art<br>Doggy!</h2>
            </div>
            <div class="topic-card">
                <img src="images/SnowFlakeOwn.svg" alt="Snow Flake">
                <h2 class="topic-card-text">Snowflake!</h2>
            </div>
            <div class="topic-card">
                <img src="images/GrassyBackground.svg" alt="Vector Grass Background">
                <h2 class="topic-card-text">Grassy Background!</h2>
            </div>
        </div>
    </section>
<!-- End of topic one------------------------------------------------------------------------------------------ -->

<!-- Topic one evaluation ------------------------------------------------------------------------------------- -->
    <section class="topic">
        <div class="topic-title">
            <h1>Evaluation</h1>
        </div>
        <div style="margin: 15px;">
            <div class="topic-card">
                <div class="topic-text">
                    <p>I have found image creation to be fun yet time comsuming.</p>
                </div>
            </div>
        </div>
    </section>

    <!-- A Simple Website Footer ------------------------------------------------------------------------------ -->
    <footer class="footer">
        <p>&copy; 2025 My Showcase Website By Alister Browne</p>
    </footer>

<!-- The end of the whole page- no more content after this! -->
</body>
</html>
